name: Deploy Backend to Railway

on:
  push:
    paths:
      - 'backend/**'
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Railway CLI
        run: curl -sSL https://raw.githubusercontent.com/railwayapp/cli/master/install.sh | sh
      - name: Login to Railway
        env:
          RAILWAY_API_KEY: ${{ secrets.RAILWAY_API_KEY }}
        run: |
          railway login --apiKey $RAILWAY_API_KEY
      - name: Deploy backend service
        run: |
          # Create or link project/service beforehand in Railway dashboard.
          # This step deploys the current backend directory as a Railway service.
          cd backend
          railway up --detach
