version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: crm-postgres-db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: xeno_crm
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - crm-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crm-backend-service
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DATABASE_PROVIDER=postgresql
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/xeno_crm?schema=public
      - GEMINI_API_KEY=${GEMINI_API_KEY:-YOUR_GEMINI_API_KEY}
      - CHANNEL_SERVICE_URL=http://channel-service:5001/send
      - RUN_SEED=true
    depends_on:
      db:
        condition: service_healthy
    networks:
      - crm-network

  channel-service:
    build:
      context: ./stub-channel-service
      dockerfile: Dockerfile
    container_name: crm-channel-service
    restart: always
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - CRM_CALLBACK_URL=http://backend:5000/receipts
    networks:
      - crm-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crm-frontend-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000
    depends_on:
      - backend
    networks:
      - crm-network

networks:
  crm-network:
    driver: bridge

volumes:
  postgres_data:
